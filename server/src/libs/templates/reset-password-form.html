<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      .email-body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f7;
        padding: 1.25rem;
        margin: 0;
      }

      .email-container {
        max-width: 37.5rem;
        margin: 0 auto;
        background: #ffffff;
        border-radius: 0.5rem;
        overflow: hidden;
        border: 0.0625rem solid #eaeaea;
        box-shadow: 0 0.25rem 0.375rem rgba(0, 0, 0, 0.1);
      }

      .email-header {
        background-color: #00338d;
        color: #ffffff;
        padding: 1.5625rem;
        text-align: center;
      }

      .header-title {
        margin: 0;
        font-size: 1.375rem;
        font-weight: bold;
      }

      .email-content {
        padding: 1.875rem;
        color: #333333;
        line-height: 1.6;
        font-size: 0.9375rem;
      }

      .button-wrapper {
        text-align: center;
        margin: 1.875rem 0;
      }

      .reset-button {
        background-color: #00338d;
        color: #ffffff !important;
        padding: 0.875rem 1.75rem;
        text-decoration: none;
        border-radius: 0.375rem;
        font-weight: bold;
        display: inline-block;
        font-size: 1rem;
      }

      .expiry-note {
        font-size: 0.8125rem;
        color: #777777;
        text-align: center;
        margin-top: 1.25rem;
      }
    </style>
  </head>

  <body class="email-body">
    <div class="email-container">
      <div class="email-header">
        <h2 class="header-title">Password Reset</h2>
      </div>

      <div class="email-content">
        <p>Hi <strong>{{email}}</strong>,</p>
        <p>
          We received a request to reset your password. If you didn't make this
          request, you can safely ignore this email.
        </p>
        <p>Otherwise, click the button below to set a new password:</p>
        <div class="button-wrapper">
          <a href="{{resetLink}}" class="reset-button">Reset Password</a>
        </div>
        <p class="expiry-note">
          <i
            >The password reset link will expire 30 minutes after it is sent.</i
          >
        </p>
      </div>
    </div>
  </body>
</html>
